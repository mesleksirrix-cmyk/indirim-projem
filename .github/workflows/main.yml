name: Market Botu Calis

on:
  schedule:
    - cron: '0 6 * * *' # Her sabah TR saatiyle 09:00'da çalışır
  workflow_dispatch: # Manuel başlatma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari cek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Kutuphaneleri Yukle
        run: |
          pip install -r requirements.txt

      - name: Chrome Kur (Selenium icin)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Botu Calistir
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python bot.py
